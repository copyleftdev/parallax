[book]
title = "Parallax"
description = "Rust-native graph engine for cyber asset intelligence"
authors = ["Parallax Contributors"]
language = "en"
src = "src"

[output.html]
no-section-label = false
fold.enable = true
fold.level = 1
additional-css = ["custom.css"]
git-repository-url = "https://github.com/copyleftdev/parallax"
git-repository-icon = "fa-github"
site-url = "/parallax/"

[output.html.playground]
editable = true
line-numbers = true

[output.html.search]
limit-results = 20
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true

[preprocessor.index]

[preprocessor.links]
